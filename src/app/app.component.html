<div class="storage-container">
  <h2 class="storage-title">
    LocalStorage en Angular
  </h2>

  <div class="buttons">
    <button class="btn btn-primary" (click)="showLocalStorage()">
      Guardar datos en LocalStorage
    </button>

    <button class="btn btn-secondary" (click)="getLocalStorage()">
      Obtener datos (ver en consola)
    </button>
  </div>

  <hr class="divider">

  <p class="info">
    👉 Abre la consola (F12 → Console) para ver los datos
  </p>
</div>
